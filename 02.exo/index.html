<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/style.css">
    <script defer src="script/script.js"></script>
    <title>Exo ....</title>
</head>

<body>
    <h1>👥 Gestionnaire de participants</h1>

    <!-- Ajout -->
    <input type="text" class="inputNom" placeholder="Nom du participant">
    <button class="btnAjouter">Ajouter</button>
    <p id="messageAjout"></p>

    <!-- Liste -->
    <h2>Liste (<span class="compteur">0</span> participants)</h2>
    <ul class="listeParticipants"></ul>

    <!-- Recherche -->
    <h2>Rechercher un participant</h2>
    <input type="text" class="inputRecherche" placeholder="Rechercher...">
    <button class="btnRechercher">Rechercher</button>
    <p class="resultatRecherche"></p>

    <!-- Récap -->
    <h2>Récapitulatif</h2>
    <p class="recap">Aucun participant pour le moment.</p>
</body>

</html>
